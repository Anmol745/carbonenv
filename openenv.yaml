name: carbon-credit-env
version: "1.0.0"
description: Carbon-aware job scheduling simulation for data centers where agents schedule compute jobs while managing carbon budgets and trading carbon credits.
author: "Anmol"
license: MIT
tags:
  - openenv
  - scheduling
  - climate
  - carbon
  - reinforcement-learning
  - data-center

environment:
  entry_point: "env.carbon_env:CarbonEnv"
  observation_model: "env.models:Observation"
  action_model: "env.models:Action"
  reward_model: "env.models:Reward"

  observation_space:
    jobs_remaining:
      type: int
      description: "Unscheduled jobs remaining"
    jobs_completed:
      type: int
      description: "Jobs finished this episode"
    carbon_budget:
      type: float
      description: "Total CO2 budget in kg"
    carbon_used:
      type: float
      description: "CO2 emitted so far in kg"
    energy_price:
      type: float
      description: "Grid energy price per MWh"
    renewable_ratio:
      type: float
      description: "Grid renewable fraction between 0 and 1"
    carbon_credit_price:
      type: float
      description: "Carbon credit spot price per credit"
    server_load:
      type: float
      description: "Server utilization between 0 and 1"
    credits_held:
      type: float
      description: "Credits in agent portfolio"
    timestep:
      type: int
      description: "Current episode step"
    max_timesteps:
      type: int
      description: "Episode length"
    task_id:
      type: int
      description: "Active task 1 2 or 3"

  action_space:
    action_type:
      type: str
      choices:
        - allocate_jobs
        - delay_jobs
        - buy_carbon_credits
        - sell_carbon_credits
        - idle
    amount:
      type: float
      description: "Magnitude of the action between 0 and 10"

tasks:
  - id: 1
    name: "Green Window Scheduling"
    difficulty: easy
    description: "Schedule 12 jobs in 24 steps maximizing renewable energy usage."
    grader: "tasks.task1:grade"
    max_timesteps: 24
    total_jobs: 12
    carbon_budget: 200.0

  - id: 2
    name: "Budget-Constrained Execution"
    difficulty: medium
    description: "Complete 30 jobs in 48 steps without exceeding 150 kg CO2."
    grader: "tasks.task2:grade"
    max_timesteps: 48
    total_jobs: 30
    carbon_budget: 150.0

  - id: 3
    name: "Profit-Aware Carbon Trading"
    difficulty: hard
    description: "Complete 50 jobs in 72 steps under 120 kg CO2 with profitable trading."
    grader: "tasks.task3:grade"
    max_timesteps: 72
    total_jobs: 50
    carbon_budget: 120.0

inference:
  script: "inference.py"
  client: openai
  env_vars:
    API_BASE_URL: "LLM API endpoint"
    MODEL_NAME: "Model identifier"
    HF_TOKEN: "Hugging Face API key"

baseline:
  seed: 42
  model: "meta-llama/Llama-3.1-8B-Instruct"
  expected_scores:
    task_1: 0.47
    task_2: 0.53
    task_3: 0.55
